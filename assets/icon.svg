<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6C3BF5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="innerGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#A78BFA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#60A5FA;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>
  <!-- Background rounded square -->
  <rect x="32" y="32" width="448" height="448" rx="80" ry="80" fill="url(#bgGrad)" filter="url(#shadow)"/>
  <!-- Minecraft block pattern (3x3 grid) -->
  <g transform="translate(96, 96)" opacity="0.15">
    <rect x="0" y="0" width="100" height="100" fill="#fff" rx="8"/>
    <rect x="110" y="0" width="100" height="100" fill="#fff" rx="8"/>
    <rect x="220" y="0" width="100" height="100" fill="#fff" rx="8"/>
    <rect x="0" y="110" width="100" height="100" fill="#fff" rx="8"/>
    <rect x="110" y="110" width="100" height="100" fill="#fff" rx="8"/>
    <rect x="220" y="110" width="100" height="100" fill="#fff" rx="8"/>
    <rect x="0" y="220" width="100" height="100" fill="#fff" rx="8"/>
    <rect x="110" y="220" width="100" height="100" fill="#fff" rx="8"/>
    <rect x="220" y="220" width="100" height="100" fill="#fff" rx="8"/>
  </g>
  <!-- O letter / Omni symbol -->
  <circle cx="256" cy="240" r="100" fill="none" stroke="white" stroke-width="28" stroke-linecap="round"/>
  <!-- Play arrow inside -->
  <polygon points="232,200 296,240 232,280" fill="white"/>
  <!-- MC text -->
  <text x="256" y="400" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="bold" font-size="64" fill="white" opacity="0.95">MC</text>
</svg>
