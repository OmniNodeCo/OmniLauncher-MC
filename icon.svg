<svg xmlns="http://www.w3.org/2000/svg" width="256" height="256" viewBox="0 0 256 256">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
  </defs>

  <!-- Outer background -->
  <rect width="256" height="256" rx="48" fill="url(#bgGrad)"/>

  <!-- Inner glass panel -->
  <rect x="16" y="16" width="224" height="224" rx="36" fill="#16213e" opacity="0.8"/>

  <!-- Shine overlay -->
  <rect x="16" y="16" width="224" height="112" rx="36" fill="url(#shineGrad)"/>

  <!-- Decorative corner accent top left -->
  <path d="M16 60 L16 52 Q16 16 52 16 L60 16" stroke="#e94560" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Decorative corner accent top right -->
  <path d="M196 16 L204 16 Q240 16 240 52 L240 60" stroke="#e94560" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Decorative corner accent bottom left -->
  <path d="M16 196 L16 204 Q16 240 52 240 L60 240" stroke="#e94560" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Decorative corner accent bottom right -->
  <path d="M196 240 L204 240 Q240 240 240 204 L240 196" stroke="#e94560" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Hexagon background shape -->
  <polygon
    points="128,52 176,80 176,136 128,164 80,136 80,80"
    fill="#0f3460"
    filter="url(#shadow)"
  />
  <polygon
    points="128,58 171,83 171,133 128,158 85,133 85,83"
    fill="none"
    stroke="url(#accentGrad)"
    stroke-width="2"
    opacity="0.6"
  />

  <!-- Large O letter with glow -->
  <text
    x="128"
    y="148"
    text-anchor="middle"
    font-family="Segoe UI, Arial Black, Arial"
    font-size="88"
    font-weight="900"
    fill="url(#accentGrad)"
    filter="url(#glow)"
  >O</text>

  <!-- Bottom section divider -->
  <rect x="48" y="172" width="160" height="2" rx="1" fill="url(#accentGrad)" opacity="0.6"/>

  <!-- MC text -->
  <text
    x="128"
    y="200"
    text-anchor="middle"
    font-family="Segoe UI, Arial"
    font-size="18"
    font-weight="700"
    letter-spacing="8"
    fill="#ffffff"
    opacity="0.9"
  >MC</text>

  <!-- Dot accents -->
  <circle cx="68" cy="196" r="3" fill="#e94560" opacity="0.8"/>
  <circle cx="188" cy="196" r="3" fill="#e94560" opacity="0.8"/>

  <!-- OMNILAUNCHER text -->
  <text
    x="128"
    y="228"
    text-anchor="middle"
    font-family="Segoe UI, Arial"
    font-size="11"
    font-weight="600"
    letter-spacing="3"
    fill="#c4c4c4"
    opacity="0.6"
  >OMNILAUNCHER</text>
</svg>
