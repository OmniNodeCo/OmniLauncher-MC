name: Generate File Tree

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate-tree:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install tree
        run: sudo apt-get update && sudo apt-get install -y tree

      - name: Generate tree file
        run: tree --dirsfirst -I ".git|__pycache__|.venv|build" > TREE.md

      - name: Configure git
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      - name: Commit and push TREE.md
        run: |
          git add TREE.md
          git diff --cached --quiet || git commit -m "Update file tree"
          git push
