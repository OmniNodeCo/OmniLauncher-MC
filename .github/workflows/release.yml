name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Generate icon.ico
        shell: pwsh
        run: |
          $bih = New-Object byte[] 40
          [BitConverter]::GetBytes([int32]40).CopyTo($bih, 0)
          [BitConverter]::GetBytes([int32]16).CopyTo($bih, 4)
          [BitConverter]::GetBytes([int32]32).CopyTo($bih, 8)
          [BitConverter]::GetBytes([int16]1).CopyTo($bih, 12)
          [BitConverter]::GetBytes([int16]32).CopyTo($bih, 14)
          [BitConverter]::GetBytes([int32]0).CopyTo($bih, 16)
          [BitConverter]::GetBytes([int32]2048).CopyTo($bih, 20)
          $xor = New-Object byte[] 2048
          for ($i = 0; $i -lt 2048; $i += 4) {
            $xor[$i]=0x50; $xor[$i+1]=0xAF; $xor[$i+2]=0x4C; $xor[$i+3]=0xFF
          }
          $and  = New-Object byte[] 128
          $totalBmp = 40 + 2048 + 128
          $offset   = 6 + 16
          $header = [byte[]](0,0,1,0,1,0)
          $entry  = [byte[]](
            16,16,0,0,1,0,32,0,
            ($totalBmp -band 0xFF),(($totalBmp -shr 8) -band 0xFF),0,0,
            ($offset   -band 0xFF),(($offset   -shr 8) -band 0xFF),0,0
          )
          New-Item -Force -ItemType Directory assets | Out-Null
          [IO.File]::WriteAllBytes("assets/icon.ico", ($header+$entry+$bih+$xor+$and))

      - name: Configure & Build
        run: |
          cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Create installer
        shell: pwsh
        run: |
          choco install innosetup --yes --no-progress
          New-Item -Force -ItemType Directory dist | Out-Null
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer/setup.iss
        continue-on-error: true

      - name: Package portable
        shell: pwsh
        run: |
          New-Item -Force -ItemType Directory dist | Out-Null
          Copy-Item build/OmniLauncher.exe dist/OmniLauncher.exe -Force
          Compress-Archive -Force `
            -Path dist/OmniLauncher.exe `
            -DestinationPath dist/OmniLauncher-Windows-x64-Portable.zip

      - uses: actions/upload-artifact@v4
        with:
          name: windows-release
          path: dist/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgtk-3-dev libcurl4-openssl-dev

      - name: Build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=Release
          cmake --build build

      - name: Package
        run: |
          mkdir -p dist
          cp build/OmniLauncher dist/OmniLauncher
          chmod +x dist/OmniLauncher
          tar -czf dist/OmniLauncher-Linux-x64.tar.gz -C dist OmniLauncher

      - uses: actions/upload-artifact@v4
        with:
          name: linux-release
          path: dist/OmniLauncher-Linux-x64.tar.gz

  release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: windows-release
          path: release/

      - uses: actions/download-artifact@v4
        with:
          name: linux-release
          path: release/

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}