name: Release OmniLauncher-MC

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number e.g. v1.0'
        required: true

permissions:
  contents: write

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build with PyInstaller
        run: uv run --with pyinstaller python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLauncher-MC-Windows
          path: dist/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build with PyInstaller
        run: uv run --with pyinstaller python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLauncher-MC-MacOS
          path: dist/

  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --frozen

      - name: Build with PyInstaller
        run: uv run --with pyinstaller python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLauncher-MC-Ubuntu
          path: dist/

  release:
    needs: [build-windows, build-macos, build-ubuntu]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows Build
        uses: actions/download-artifact@v4
        with:
          name: OmniLauncher-MC-Windows
          path: windows-build/

      - name: Download MacOS Build
        uses: actions/download-artifact@v4
        with:
          name: OmniLauncher-MC-MacOS
          path: macos-build/

      - name: Download Ubuntu Build
        uses: actions/download-artifact@v4
        with:
          name: OmniLauncher-MC-Ubuntu
          path: ubuntu-build/

      - name: Zip builds
        run: |
          cd windows-build && zip -r ../OmniLauncher-MC-Windows.zip . && cd ..
          cd macos-build && zip -r ../OmniLauncher-MC-MacOS.zip . && cd ..
          cd ubuntu-build && zip -r ../OmniLauncher-MC-Ubuntu.zip . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: OmniLauncher-MC ${{ github.event.inputs.version }}
          files: |
            OmniLauncher-MC-Windows.zip
            OmniLauncher-MC-MacOS.zip
            OmniLauncher-MC-Ubuntu.zip