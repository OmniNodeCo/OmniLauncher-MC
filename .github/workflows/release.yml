name: Release OmniLauncher-MC

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number e.g. v1.0'
        required: true

permissions:
  contents: write

env:
  UV_SYSTEM_PYTHON: 1

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra build

      - name: Install Pillow
        run: pip install pillow

      - name: Install Inkscape
        run: choco install inkscape -y

      - name: Convert SVGs to PNG
        run: |
          & "C:\Program Files\Inkscape\bin\inkscape.exe" icon.svg --export-type=png --export-filename=icon-256.png --export-width=256 --export-height=256
          & "C:\Program Files\Inkscape\bin\inkscape.exe" installer-banner.svg --export-type=png --export-filename=installer-banner.png --export-width=164 --export-height=314
          & "C:\Program Files\Inkscape\bin\inkscape.exe" installer-logo.svg --export-type=png --export-filename=installer-logo.png --export-width=55 --export-height=55

      - name: Convert PNGs to BMP and ICO
        run: |
          python - <<'EOF'
          from PIL import Image
          import os

          os.makedirs("assets", exist_ok=True)

          Image.open("installer-banner.png").save("assets/installer-banner.bmp")
          print("Banner done")

          Image.open("installer-logo.png").save("assets/installer-logo.bmp")
          print("Logo done")

          sizes = [16, 32, 48, 64, 128, 256]
          imgs = []
          for size in sizes:
              img = Image.open("icon-256.png").convert("RGBA").resize(
                  (size, size), Image.LANCZOS
              )
              imgs.append(img)

          imgs[0].save(
              "assets/icon.ico",
              format="ICO",
              append_images=imgs[1:],
              sizes=[(s, s) for s in sizes]
          )
          print("Icon done")
          print("All assets ready")
          EOF

      - name: Build with PyInstaller
        run: uv run --with pyinstaller python build.py

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build Installer
        run: iscc installer.iss

      - name: Upload portable artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLauncher-MC-Windows
          path: dist/

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLauncher-MC-Windows-Installer
          path: installer-output/

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra build

      - name: Build with PyInstaller
        run: uv run --with pyinstaller python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLauncher-MC-MacOS
          path: dist/

  build-ubuntu:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync --extra build

      - name: Build with PyInstaller
        run: uv run --with pyinstaller python build.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLauncher-MC-Ubuntu
          path: dist/

  release:
    needs: [build-windows, build-macos, build-ubuntu]
    runs-on: ubuntu-latest

    steps:
      - name: Download Windows Build
        uses: actions/download-artifact@v4
        with:
          name: OmniLauncher-MC-Windows
          path: windows-build/

      - name: Download Windows Installer
        uses: actions/download-artifact@v4
        with:
          name: OmniLauncher-MC-Windows-Installer
          path: windows-installer/

      - name: Download MacOS Build
        uses: actions/download-artifact@v4
        with:
          name: OmniLauncher-MC-MacOS
          path: macos-build/

      - name: Download Ubuntu Build
        uses: actions/download-artifact@v4
        with:
          name: OmniLauncher-MC-Ubuntu
          path: ubuntu-build/

      - name: Zip builds
        run: |
          cd windows-build && zip -r ../OmniLauncher-MC-Windows.zip . && cd ..
          cd macos-build && zip -r ../OmniLauncher-MC-MacOS.zip . && cd ..
          cd ubuntu-build && zip -r ../OmniLauncher-MC-Ubuntu.zip . && cd ..

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: OmniLauncher-MC ${{ github.event.inputs.version }}
          files: |
            OmniLauncher-MC-Windows.zip
            OmniLauncher-MC-MacOS.zip
            OmniLauncher-MC-Ubuntu.zip
            windows-installer/OmniLauncher-MC-Setup.exe