name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-dev xvfb

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run import tests
        run: |
          cd src && python -m pytest ../tests/test_imports.py -v

      - name: Run unit tests
        run: |
          cd src && python -m pytest ../tests/ -v --ignore=../tests/test_gui.py

      - name: Run GUI tests (headless)
        run: |
          cd src && xvfb-run python -m pytest ../tests/test_gui.py -v

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller pytest

      - name: Generate icons
        run: python scripts/generate_icons.py

      - name: Build executable
        run: pyinstaller build.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLauncher-MC-Windows
          path: dist/OmniLauncher-MC.exe

  build-linux:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk python3-dev

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icons
        run: python scripts/generate_icons.py

      - name: Build executable
        run: pyinstaller build.spec

      - name: Make executable
        run: chmod +x dist/OmniLauncher-MC

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLauncher-MC-Linux
          path: dist/OmniLauncher-MC

  build-macos:
    needs: test
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Generate icons
        run: python scripts/generate_icons.py

      - name: Build executable
        run: pyinstaller build.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLauncher-MC-macOS
          path: dist/OmniLauncher-MC.app