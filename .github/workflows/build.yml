name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Generate icon.ico
        shell: pwsh
        run: |
          # Minimal valid 16x16 32bpp green .ico file (binary literal)
          function New-Ico {
            param([string]$Path)
            # ICONDIR header: reserved=0, type=1 (icon), count=1
            $header = [byte[]](0,0, 1,0, 1,0)
            # ICONDIRENTRY: width=16, height=16, colorCount=0, reserved=0,
            #   planes=1, bitCount=32, bytesInRes=?, imageOffset=?
            # BMP data size = BITMAPINFOHEADER(40) + pixels(16*32*4) + mask(16*4*2) = 40+2048+128 = 2216
            $bmpSize = 40 + 16*32*4  # no AND mask needed for 32bpp with alpha
            $bmpSize = 40 + 16*16*4 + 16*4  # header + XOR + AND mask rows
            $totalBmp = 40 + 2048 + 128
            $offset = 6 + 16  # ICONDIR + ICONDIRENTRY
            $entry = [byte[]](
              16, 16,   # width, height
              0,        # color count (0 = >256 colors)
              0,        # reserved
              1, 0,     # planes
              32, 0,    # bit count
              ($totalBmp -band 0xFF), (($totalBmp -shr 8) -band 0xFF),
              0, 0,     # size high bytes
              ($offset -band 0xFF), (($offset -shr 8) -band 0xFF),
              0, 0      # offset high bytes
            )
            # BITMAPINFOHEADER
            $bih = New-Object byte[] 40
            [BitConverter]::GetBytes([int32]40).CopyTo($bih, 0)    # biSize
            [BitConverter]::GetBytes([int32]16).CopyTo($bih, 4)    # biWidth
            [BitConverter]::GetBytes([int32]32).CopyTo($bih, 8)    # biHeight (double for XOR+AND)
            [BitConverter]::GetBytes([int16]1).CopyTo($bih, 12)    # biPlanes
            [BitConverter]::GetBytes([int16]32).CopyTo($bih, 14)   # biBitCount
            [BitConverter]::GetBytes([int32]0).CopyTo($bih, 16)    # biCompression
            [BitConverter]::GetBytes([int32]2048).CopyTo($bih, 20) # biSizeImage
            # XOR bitmap: 16x16 pixels, BGRA, green (#4CAF50) fully opaque
            $xor = New-Object byte[] 2048
            for ($i = 0; $i -lt 2048; $i += 4) {
              $xor[$i+0] = 0x50  # B
              $xor[$i+1] = 0xAF  # G
              $xor[$i+2] = 0x4C  # R
              $xor[$i+3] = 0xFF  # A
            }
            # AND mask: 16 rows * 4 bytes (32 bits per row, padded) = all 0 (fully opaque)
            $and = New-Object byte[] 128
            $all = $header + $entry + $bih + $xor + $and
            [IO.File]::WriteAllBytes($Path, $all)
          }
          New-Item -Force -ItemType Directory assets | Out-Null
          New-Ico -Path "assets/icon.ico"
          Write-Host "Icon created: $((Get-Item assets/icon.ico).Length) bytes"

      - name: Configure CMake
        run: cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLauncher-Windows-x64
          path: build/OmniLauncher.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgtk-3-dev \
            libcurl4-openssl-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLauncher-Linux-x64
          path: build/OmniLauncher