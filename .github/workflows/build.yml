name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Generate icon.ico
        shell: pwsh
        run: |
          $bih = New-Object byte[] 40
          [BitConverter]::GetBytes([int32]40).CopyTo($bih, 0)
          [BitConverter]::GetBytes([int32]16).CopyTo($bih, 4)
          [BitConverter]::GetBytes([int32]32).CopyTo($bih, 8)
          [BitConverter]::GetBytes([int16]1).CopyTo($bih, 12)
          [BitConverter]::GetBytes([int16]32).CopyTo($bih, 14)
          [BitConverter]::GetBytes([int32]0).CopyTo($bih, 16)
          [BitConverter]::GetBytes([int32]2048).CopyTo($bih, 20)
          $xor = New-Object byte[] 2048
          for ($i = 0; $i -lt 2048; $i += 4) {
            $xor[$i]=0x50; $xor[$i+1]=0xAF; $xor[$i+2]=0x4C; $xor[$i+3]=0xFF
          }
          $and = New-Object byte[] 128
          $totalBmp = 40 + 2048 + 128
          $offset = 6 + 16
          $header = [byte[]](0,0,1,0,1,0)
          $entry = [byte[]](
            16,16,0,0,1,0,32,0,
            ($totalBmp -band 0xFF),(($totalBmp -shr 8) -band 0xFF),0,0,
            ($offset   -band 0xFF),(($offset   -shr 8) -band 0xFF),0,0
          )
          New-Item -Force -ItemType Directory assets | Out-Null
          [IO.File]::WriteAllBytes("assets/icon.ico", ($header+$entry+$bih+$xor+$and))
          Write-Host "Icon: $((Get-Item assets/icon.ico).Length) bytes"

      - name: Ensure resource.h has proper line endings
        shell: pwsh
        run: |
          # Write with explicit CRLF to satisfy RC compiler
          $content = "#ifndef RESOURCE_H`r`n#define RESOURCE_H`r`n`r`n#define IDI_APPICON  101`r`n#define IDI_TRAYICON 102`r`n`r`n#endif`r`n"
          [IO.File]::WriteAllText("src/resource.h", $content, [Text.Encoding]::ASCII)
          Write-Host "resource.h written: $((Get-Item src/resource.h).Length) bytes"

      - name: Configure CMake
        run: cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLauncher-Windows-x64
          path: build/OmniLauncher.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libgtk-3-dev \
            libcurl4-openssl-dev

      - name: Configure CMake
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLauncher-Linux-x64
          path: build/OmniLauncher