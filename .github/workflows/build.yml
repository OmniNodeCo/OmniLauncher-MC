name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Generate icon.ico from SVG
        shell: pwsh
        run: |
          # Create a simple .ico from the SVG using magick if available, otherwise use a placeholder
          if (Get-Command magick -ErrorAction SilentlyContinue) {
            magick convert -background none -resize 256x256 assets/icon.svg assets/icon.ico
          } else {
            # Create minimal valid .ico (16x16 1-bit) as fallback
            $ico = [byte[]]@(
              0,0,1,0,1,0,16,16,0,0,1,0,32,0,104,4,0,0,22,0,0,0
            )
            # BMP header for 16x16 32bpp
            $bmp = New-Object byte[] 1064
            # BITMAPINFOHEADER
            [System.BitConverter]::GetBytes([int32]40).CopyTo($bmp, 0)   # biSize
            [System.BitConverter]::GetBytes([int32]16).CopyTo($bmp, 4)   # biWidth
            [System.BitConverter]::GetBytes([int32]32).CopyTo($bmp, 8)   # biHeight (doubled)
            [System.BitConverter]::GetBytes([int16]1).CopyTo($bmp, 12)   # biPlanes
            [System.BitConverter]::GetBytes([int16]32).CopyTo($bmp, 14)  # biBitCount
            # Fill with green color (BGRA)
            for ($i = 40; $i -lt 1064; $i += 4) {
              $bmp[$i] = 0x50   # B
              $bmp[$i+1] = 0xAF # G
              $bmp[$i+2] = 0x4C # R
              $bmp[$i+3] = 0xFF # A
            }
            # Update ico header with actual size
            $totalSize = $ico.Length + $bmp.Length - 22
            [System.BitConverter]::GetBytes([int32]$bmp.Length).CopyTo($ico, 14)
            [System.BitConverter]::GetBytes([int32]22).CopyTo($ico, 18)
            $result = $ico + $bmp
            [System.IO.File]::WriteAllBytes("assets/icon.ico", $result)
          }

      - name: Configure CMake
        run: cmake -B build -G "NMake Makefiles" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLauncher-Windows-x64
          path: build/OmniLauncher.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libgtk-3-dev libcurl4-openssl-dev

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OmniLauncher-Linux-x64
          path: build/OmniLauncher