<svg xmlns="http://www.w3.org/2000/svg" width="55" height="55" viewBox="0 0 55 55">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f3460"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e94560"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
    </linearGradient>
    <linearGradient id="shineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Outer background -->
  <rect width="55" height="55" rx="14" fill="url(#bgGrad)"/>

  <!-- Inner panel -->
  <rect x="3" y="3" width="49" height="49" rx="11" fill="#16213e" opacity="0.9"/>

  <!-- Shine -->
  <rect x="3" y="3" width="49" height="24" rx="11" fill="url(#shineGrad)"/>

  <!-- Corner accents -->
  <path d="M3 16 L3 14 Q3 3 14 3 L16 3" stroke="#e94560" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M39 3 L41 3 Q52 3 52 14 L52 16" stroke="#e94560" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M3 39 L3 41 Q3 52 14 52 L16 52" stroke="#e94560" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>
  <path d="M39 52 L41 52 Q52 52 52 41 L52 39" stroke="#e94560" stroke-width="2" fill="none" stroke-linecap="round" opacity="0.8"/>

  <!-- Hexagon -->
  <polygon
    points="27.5,10 38,16 38,28 27.5,34 17,28 17,16"
    fill="#0f3460"
  />
  <polygon
    points="27.5,12 36,17 36,27 27.5,32 19,27 19,17"
    fill="none"
    stroke="url(#accentGrad)"
    stroke-width="1"
    opacity="0.7"
  />

  <!-- O letter -->
  <text
    x="27.5"
    y="30"
    text-anchor="middle"
    font-family="Segoe UI, Arial Black"
    font-size="18"
    font-weight="900"
    fill="#e94560"
    filter="url(#glow)"
  >O</text>

  <!-- Bottom accent line -->
  <rect x="14" y="40" width="27" height="2" rx="1" fill="url(#accentGrad)" opacity="0.8"/>

  <!-- Bottom dots -->
  <circle cx="20" cy="48" r="1.5" fill="#e94560" opacity="0.6"/>
  <circle cx="27.5" cy="48" r="1.5" fill="#e94560" opacity="0.9"/>
  <circle cx="35" cy="48" r="1.5" fill="#e94560" opacity="0.6"/>
</svg>